version: '3.8'
services:
  api:
    build: .
    ports:
      - "5000:80"
    depends_on:
      - redis
      - sqlserver

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  sqlserver:
    image: mcr.microsoft.com/mssql/server
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
